<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <h1>📅 Time Tracker</h1>
  
  <div class="toolbar">
    <button id="addTimerBtn" class="add-btn">+ Add New Timer</button>
    <button id="importJsonBtn" class="json-btn">Import JSON</button>
    <button id="exportJsonBtn" class="json-btn">Export JSON</button>
  </div>
  
  <div class="container" id="timers"></div>

  <!-- Add Timer Modal -->
  <div id="addTimerModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2>Add New Timer</h2>
      <form id="timerForm">
        <div class="form-group">
          <label for="eventName">Event Name:</label>
          <input type="text" id="eventName" required>
        </div>
        <div class="form-group">
          <label for="eventDate">Date:</label>
          <input type="date" id="eventDate" required>
        </div>
        <div class="form-group">
          <label for="eventTime">Time:</label>
          <input type="time" id="eventTime" required>
        </div>
        <div class="form-group">
          <input type="checkbox" id="isHoliday">
          <label for="isHoliday">Is this a holiday/vacation?</label>
        </div>
        <div class="form-group" id="endDateGroup" style="display: none;">
          <label for="endDate">End Date:</label>
          <input type="date" id="endDate">
          <label for="endTime">End Time:</label>
          <input type="time" id="endTime" value="23:59">
        </div>
        <button type="submit" class="submit-btn">Add Timer</button>
      </form>
    </div>
  </div>

  <!-- JSON Import Modal -->
  <div id="jsonModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2 id="jsonModalTitle">Import JSON</h2>
      <textarea id="jsonData" placeholder='Paste your JSON data here...'></textarea>
      <button id="confirmJsonBtn" class="submit-btn">Confirm</button>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
